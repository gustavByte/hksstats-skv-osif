name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify frontend syntax
        run: node --check app.js

      - name: Rebuild generated data
        run: python scripts/build_data.py

      - name: Rebuild static site
        run: python scripts/build_static_site.py

      - name: Assert no public download artifacts
        run: |
          test ! -d public/downloads
          test ! -d docs/downloads

      - name: Assert generated files are committed
        run: git diff --exit-code
